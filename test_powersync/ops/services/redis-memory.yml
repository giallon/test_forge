services:
  redis-memory:
    image: redis:8-alpine
    container_name: redis-memory
    restart: unless-stopped
    environment:
      REDIS_MEMORY_PORT: ${REDIS_MEMORY_PORT:-6379}
    ports:
      - "${REDIS_MEMORY_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly no
      --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      start_period: 5s
      timeout: 10s
      retries: 3
